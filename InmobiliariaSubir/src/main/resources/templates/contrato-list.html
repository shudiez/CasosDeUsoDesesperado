<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
 
<head>
    <meta charset="UTF-8">
    <title>Lista de Contratos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
 
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Contratos</h2>
        <a th:href="@{/contrato/nuevo}" class="btn btn-primary">Nuevo Contrato</a>
    </div>
	
		<!--barra de filtro-->
	<form method="get" th:action="@{/contratos}" class="row g-3 mb-4 p-3 bg-light rounded border">
				    <div class="col-md-3">
				        <input type="text" name="propiedad" th:value="${propiedadBuscada}" class="form-control" placeholder="Buscar por Propiedad...">
				    </div>
				    <div class="col-md-3">
				        <input type="text" name="inquilino" th:value="${inquilinoBuscado}" class="form-control" placeholder="Buscar por Inquilino...">
				    </div>
				    <div class="col-md-2">
				        <select name="estado" class="form-select">
				            <option value="">-- Estado --</option>
				            <option th:each="est : ${estados}" th:value="${est}" th:text="${est}" th:selected="${est == estadoBuscado}"></option>
				        </select>
				    </div>
				    <div class="col-md-2">
				        <input type="date" name="fechaInicio" th:value="${fechaBuscada}" class="form-control">
				    </div>
				    <div class="col-md-2 d-flex gap-2">
				        <button type="submit" class="btn btn-dark w-100">Filtrar</button>
				        <a th:href="@{/contratos}" class="btn btn-outline-secondary">Limpiar</a>
				    </div>
				</form>
	
				
					<div th:if="${success != null}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
				        <span th:text="${success}"></span>
				        <a th:href="@{/contratos}" class="btn-close"  aria-label="Close"></a>
				    </div>
 
				    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
				        <span th:text="${error}"></span>
				        <a th:href="@{/contratos}"  class="btn-close"  aria-label="Close"></a>
				    </div>
				
				
    <table class="table table-striped table-bordered align-middle shadow-sm">
        <thead class="table-dark text-center">
            <tr>
				<th>ID</th>
				<th>Propiedad</th>
               
                <th>Inquilino</th>
                <th>Fecha Inicio</th>
				<th>Duracion contrato</th>
				
                <th>Importe Mensual</th>
                <th>Vencimiento</th>
                <th>Estado</th>
                <th>Acciones</th>		
            </tr>
        </thead>
        <tbody>
			
						
			
            <tr th:each="c : ${contratos}">
				
				<td class="text-center fw-bold" th:text="${c.id}"></td>
				                
				<td th:text="${c.propiedad != null ? c.propiedad.direccion : 'No asignada'}"></td>
				                				                
				<td th:text="${c.inquilino != null ? (c.inquilino.apellido + ', ' + c.inquilino.nombre) : 'No asignado'}"></td>
				                
				<td class="text-center" th:text="${c.fechaInicio != null ? #temporals.format(c.fechaInicio, 'dd/MM/yyyy') : '-'}"></td>
						                
				<td class="text-center" th:text="${c.duracionMeses != null} ? 'Meses ' + ${c.duracionMeses} : '-'"></td>
				
				<td class="text-end fw-bold text-success" th:text="${c.importeMensual != null ? '$ ' + #numbers.formatDecimal(c.importeMensual, 1, 'POINT', 2, 'COMMA') : '$ 0,00'}"></td>
				                
				<td class="text-center" th:text="${c.diaVencimientoMensual != null ? 'Día ' + c.diaVencimientoMensual : '-'}"></td>
				                
				<td class="text-center">
					<span th:if="${c.estado != null}"
						th:classappend="${c.estado.name() == 'ACTIVO' ? 'bg-success' :
						(c.estado.name() == 'RESCINDIDO' ? 'bg-danger' :
						(c.estado.name() == 'BORRADOR' ?'bg-warning text-dark' :
						(c.estado.name() == 'FINALIZADO' ? 'bg-primary' : 'bg-secondary')))}"
						class="badge rounded-pill px-3 py-2"
						th:text="${c.estado}">
					</span>
					
				</td>
				                
				<td class="text-center">
					<div class="btn-group" role="group">
						<a th:href="@{/contrato/editar/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Editar</a>
						<a th:href="@{/contrato/eliminar/{id}(id=${c.id})}" class="btn btn-danger btn-sm"
						onclick="return confirm('¿Seguro que deseas eliminar este contrato?')">Eliminar</a>
					</div>
				</td>
			</tr>
			<tr th:if="${#lists.isEmpty(contratos)}">
			    <td colspan="8" class="text-center text-muted py-4">No hay contratos registrados en el sistema.</td>
			</tr>
        </tbody>
    </table>
	<a th:href="@{/}" class="btn btn-secondary mt-3">Inicio</a>
    <a th:href="@{/propiedades}" class="btn btn-secondary mt-3">Ir a Propiedades</a>
 
 
</body>
 
</html>
