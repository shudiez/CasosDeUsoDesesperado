<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <!-- Título de la pestaña -->
    <title>Lista de Ciudades</title>

    <!-- Bootstrap para los estilos -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- Barra superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-building-gear me-2"></i>
                Casos de uso desesperado
            </a>

            <span class="navbar-text text-white-50">
                Gestión de Ubicaciones
            </span>

        </div>
    </nav>

    <div class="container my-5">

        <!-- Título de la página y botones -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold text-dark mb-0">
                <i class="bi bi-geo-alt-fill text-secondary me-2"></i>
                Lista de Ciudades
            </h2>

            <div>

                <!-- Vuelve a la pantalla principal -->
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-left-short"></i>
                    Volver al Inicio
                </a>

                <!-- Abre el formulario para crear una ciudad -->
                <a th:href="@{/ciudad/nueva}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i>
                    Nueva Ciudad
                </a>

            </div>

        </div>

        <!-- Muestra un mensaje si ocurre un error -->
        <div th:if="${error}"
             class="alert alert-danger shadow-sm"
             th:text="${error}">
        </div>

        <!-- Tarjeta que contiene la tabla -->
        <div class="card shadow">

            <div class="card-header bg-dark text-white">
                <h5 class="mb-0 fs-6">
                    <i class="bi bi-table me-2"></i>
                    Ciudades Registradas
                </h5>
            </div>

            <div class="card-body p-0">

                <div class="table-responsive">

                    <!-- Tabla con todas las ciudades -->
                    <table class="table table-striped table-hover align-middle mb-0">

                        <thead class="table-dark">

                            <tr>
                                <th style="width: 10%">ID</th>
                                <th style="width: 45%">Nombre</th>
                                <th style="width: 25%">Provincia</th>
                                <th style="width: 20%" class="text-center">
                                    Acciones
                                </th>
                            </tr>

                        </thead>

                        <tbody>

                            <!-- Recorre la lista de ciudades -->
                            <tr th:each="ciudad : ${ciudades}">

                                <td class="fw-bold"
                                    th:text="${ciudad.id}">
                                </td>

                                <td th:text="${ciudad.nombre}">
                                </td>

                                <!-- Muestra el nombre de la provincia -->
                                <td th:text="${ciudad.provincia != null ? ciudad.provincia.nombre : 'Sin provincia'}">
                                </td>

                                <!-- Botones para editar o eliminar -->
                                <td class="text-center">

                                    <div class="btn-group btn-group-sm"
                                         role="group">

                                        <!-- Edita la ciudad -->
                                        <a th:href="@{/ciudad/editar/{id}(id=${ciudad.id})}"
                                           class="btn btn-outline-primary"
                                           title="Editar">

                                            <i class="bi bi-pencil-square"></i>
                                            Editar

                                        </a>

                                        <!-- Elimina la ciudad -->
                                        <a th:href="@{/ciudad/eliminar/{id}(id=${ciudad.id})}"
                                           onclick="return confirm('¿Está seguro de eliminar la ciudad?')"
                                           class="btn btn-outline-danger"
                                           title="Eliminar">

                                            <i class="bi bi-trash"></i>
                                            Eliminar

                                        </a>

                                    </div>

                                </td>

                            </tr>

                            <!-- Se muestra si no hay ciudades cargadas -->
                            <tr th:if="${#lists.isEmpty(ciudades)}">

                                <td colspan="4"
                                    class="text-center text-muted py-4">

                                    <i class="bi bi-info-circle me-2"></i>

                                    No se encontraron ciudades cargadas en el sistema.

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- Pie de página -->
    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
