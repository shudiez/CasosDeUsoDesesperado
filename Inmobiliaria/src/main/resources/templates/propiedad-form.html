<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">

	<!-- Título de la pestaña -->
	<title>Alta de Propiedad</title>

	<!-- Bootstrap para los estilos -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

	<!-- Iconos de Bootstrap -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

	<!-- Barra superior -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
		<div class="container">
			<a class="navbar-brand fw-bold" href="#">
				<i class="bi bi-building-gear me-2"></i>
				Casos de uso desesperado
			</a>

			<span class="navbar-text text-white-50">
				Gestión de Propiedades
			</span>
		</div>
	</nav>

	<div class="container mt-5">

		<!-- Tarjeta que contiene el formulario -->
		<div class="card shadow">

			<!-- Título del formulario -->
			<div class="card-header bg-success text-white">
				<h3 class="mb-0">
					<i class="bi bi-house-add-fill"></i>
					Alta de Propiedad
				</h3>
			</div>

			<div class="card-body">

				<!-- Muestra un mensaje si ocurre un error -->
				<div th:if="${error}" class="alert alert-danger" th:text="${error}">
				</div>

				<!-- Formulario para guardar una propiedad -->
				<form th:action="@{/propiedades}"
					  th:object="${propiedadForm}"
					  method="post">

					<!-- Guarda el id cuando se está editando -->
					<input type="hidden" th:field="*{id}">

					<div class="row">

						<!-- Dirección -->
						<div class="col-md-6 mb-3">
							<label class="form-label fw-bold">Dirección</label>

							<input type="text"
								   class="form-control"
								   th:field="*{direccion}">

							<!-- Error de validación -->
							<div class="text-danger"
								 th:if="${#fields.hasErrors('direccion')}"
								 th:errors="*{direccion}">
							</div>
						</div>

						<!-- Ciudad -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">Ciudad</label>

							<div class="input-group">

								<!-- Lista de ciudades -->
								<select class="form-select"
										th:field="*{ciudadId}">

									<option value="">Seleccione...</option>

									<option th:each="ciudad : ${ciudades}"
											th:value="${ciudad.id}"
											th:text="${ciudad.nombre}">
									</option>

								</select>

								<!-- Permite crear una ciudad nueva -->
								<a th:href="@{/ciudad/nueva}"
								   target="_blank"
								   class="btn btn-outline-secondary"
								   title="Agregar Nueva Ciudad">

									<i class="bi bi-geo-alt-fill text-success"></i> +

								</a>

							</div>

							<div class="text-danger"
								 th:if="${#fields.hasErrors('ciudadId')}"
								 th:errors="*{ciudadId}">
							</div>

						</div>

						<!-- Provincia -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">Provincia</label>

							<div class="input-group">

								<!-- Lista de provincias -->
								<select class="form-select"
										th:field="*{provinciaId}">

									<option value="">Seleccione...</option>

									<option th:each="provincia : ${provincias}"
											th:value="${provincia.id}"
											th:text="${provincia.nombre}">
									</option>

								</select>

								<!-- Permite crear una provincia nueva -->
								<a th:href="@{/provincia/nueva}"
								   target="_blank"
								   class="btn btn-outline-secondary"
								   title="Agregar Nueva Provincia">

									<i class="bi bi-map-fill text-primary"></i> +

								</a>

							</div>

							<div class="text-danger"
								 th:if="${#fields.hasErrors('provinciaId')}"
								 th:errors="*{provinciaId}">
							</div>

						</div>

						<!-- Tipo -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">
								Tipo de Propiedad
							</label>

							<select class="form-select"
									th:field="*{tipo}">

								<option value="">Seleccione...</option>

								<option th:each="tipo : ${tipos}"
										th:value="${tipo}"
										th:text="${tipo}">
								</option>

							</select>

							<div class="text-danger"
								 th:if="${#fields.hasErrors('tipo')}"
								 th:errors="*{tipo}">
							</div>

						</div>

						<!-- Estado -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">
								Estado
							</label>

							<select class="form-select"
									th:field="*{estadoDisponibilidad}">

								<option th:each="estado : ${estados}"
										th:value="${estado}"
										th:text="${estado}">
								</option>

							</select>

						</div>

						<!-- Cantidad de ambientes -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">
								Cantidad de Ambientes
							</label>

							<input type="number"
								   class="form-control"
								   min="1"
								   th:field="*{cantidadAmbientes}">

							<div class="text-danger"
								 th:if="${#fields.hasErrors('cantidadAmbientes')}"
								 th:errors="*{cantidadAmbientes}">
							</div>

						</div>

						<!-- Metros cuadrados -->
						<div class="col-md-6 mb-3">

							<label class="form-label fw-bold">
								Metros Cuadrados
							</label>

							<input type="number"
								   class="form-control"
								   min="1"
								   step="0.01"
								   th:field="*{metrosCuadrados}">

							<div class="text-danger"
								 th:if="${#fields.hasErrors('metrosCuadrados')}"
								 th:errors="*{metrosCuadrados}">
							</div>

						</div>

						<!-- Descripción -->
						<div class="col-12 mb-3">

							<label class="form-label fw-bold">
								Descripción
							</label>

							<textarea class="form-control"
									  rows="3"
									  th:field="*{descripcion}">
							</textarea>

							<div class="text-danger"
								 th:if="${#fields.hasErrors('descripcion')}"
								 th:errors="*{descripcion}">
							</div>

						</div>

						<!-- Comodidades -->
						<div class="col-12 mb-3">

							<label class="form-label fw-bold">
								Comodidades
							</label>

							<input type="text"
								   class="form-control"
								   th:field="*{comodidades}">

							<div class="text-danger"
								 th:if="${#fields.hasErrors('comodidades')}"
								 th:errors="*{comodidades}">
							</div>

						</div>

						<!-- Propietario -->
						<div class="col-12 mb-4">

							<label class="form-label fw-bold">
								Propietario
							</label>

							<div class="input-group">

								<!-- Lista de propietarios -->
								<select class="form-select"
										th:field="*{propietarioId}">

									<option value="">Seleccione...</option>

									<option th:each="propietario : ${propietarios}"
											th:value="${propietario.id}"
											th:text="${propietario.nombre + ' ' + propietario.apellido}">
									</option>

								</select>

								<!-- Permite crear un propietario nuevo -->
								<a th:href="@{/persona/nueva}"
								   target="_blank"
								   class="btn btn-outline-secondary"
								   title="Registrar Nuevo Propietario">

									<i class="bi bi-person-plus-fill text-success"></i>
									+ Nuevo Propietario

								</a>

							</div>

							<div class="text-danger"
								 th:if="${#fields.hasErrors('propietarioId')}"
								 th:errors="*{propietarioId}">
							</div>

						</div>

					</div>

					<!-- Botones -->
					<div class="text-center">

						<!-- Guarda la propiedad -->
						<button type="submit"
								class="btn btn-success me-2">
							<i class="bi bi-check-circle"></i>
							Guardar
						</button>

						<!-- Vuelve al listado -->
						<a th:href="@{/propiedades}"
						   class="btn btn-secondary">
							<i class="bi bi-arrow-left"></i>
							Volver al listado
						</a>

					</div>

				</form>

			</div>

		</div>

	</div>

	<!-- Pie de página -->
	<footer class="mt-5 py-3 bg-white border-top text-center text-muted">
		© 2026 Casos de uso desesperado - Desarrollo de Software
	</footer>

</body>

</html>
