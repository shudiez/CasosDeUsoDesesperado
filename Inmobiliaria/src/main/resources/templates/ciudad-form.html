<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nueva Ciudad</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- Barra superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-building-gear me-2"></i>
                Casos de uso desesperado
            </a>
            <span class="navbar-text text-white-50">
                Gestión de Ubicaciones
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow" style="max-width: 700px; margin: 0 auto;">

            <div class="card-header bg-dark text-white">
                <h3 class="mb-0 fs-5">
                    <i class="bi bi-geo-alt-fill me-2"></i>
                    Alta de Ciudad
                </h3>
            </div>

            <div class="card-body p-4">

                <!-- Mensaje de error general -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                </div>

                <form th:action="@{/ciudades}" th:object="${ciudadForm}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <!-- Nombre de la Ciudad -->
                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Nombre de la Ciudad</label>
                            <input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: Quilmes">
                            <div class="text-danger small fw-bold mt-1"
                                th:if="${#fields.hasErrors('nombre')}"
                                th:errors="*{nombre}">
                            </div>
                        </div>

                        <!-- Provincia -->
                        <div class="col-12 mb-4">
                            <label class="form-label fw-bold">Provincia</label>
							
                            <select class="form-select" th:field="*{provinciaId}">
                                <option value="">Seleccione una provincia</option>
								
                                <option th:each="provincia : ${provincias}" 
                                        th:value="${provincia.id}" 
                                        th:text="${provincia.nombre}">
                                </option>
                            </select>
							
                            <div class="text-danger small fw-bold mt-1"
                                th:if="${#fields.hasErrors('provinciaId')}"
                                th:errors="*{provinciaId}">
                            </div>
                        </div>

                    </div>

                    <!-- Botones de Acción -->
                    <div class="text-center border-top pt-3">
                        <button type="submit" class="btn btn-success me-2">
                            <i class="bi bi-check-circle me-1"></i> Guardar
                        </button>
                        <a th:href="@{/ciudades}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left-short"></i> Volver al listado
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
