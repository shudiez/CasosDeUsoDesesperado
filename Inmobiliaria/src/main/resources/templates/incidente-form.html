<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nuevo Incidente</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-building-gear me-2"></i>
                Casos de uso desesperado
            </a>
            <span class="navbar-text text-white-50">
                Gestión de Incidentes
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow" style="max-width: 850px; margin: 0 auto;">

            <div class="card-header bg-dark text-white">
                <h3 class="mb-0 fs-5">
                    <i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>
                    Registrar Nuevo Incidente
                </h3>
            </div>

            <div class="card-body p-4">

                <form th:action="@{/incidentes}" th:object="${incidente}" method="post">

                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Título / Breve Resumen</label>
                            <input type="text" class="form-control" th:field="*{titulo}" required placeholder="Ej: Filtración de agua en baño principal">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Propiedad Afectada</label>
                            <div class="input-group">
                                <select class="form-select" th:field="*{propiedad}">
                                    <option value="">Seleccione...</option>
                                    <option th:each="propiedad : ${propiedades}"
                                            th:value="${propiedad.id}"
                                            th:text="${propiedad.direccion}"></option>
                                </select>
                                <a th:href="@{/propiedad/nueva}" target="_blank" class="btn btn-outline-secondary" title="Agregar Propiedad">
                                    <i class="bi bi-house-plus-fill text-success"></i> +
                                </a>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Categoría</label>
                            <select class="form-select" th:field="*{categoria}">
                                <option value="">Seleccione...</option>
                                <option th:each="categoria : ${categorias}"
                                        th:value="${categoria}"
                                        th:text="${categoria}"></option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Prioridad</label>
                            <select class="form-select" th:field="*{prioridad}">
                                <option value="">Seleccione...</option>
                                <option th:each="prioridad : ${prioridades}"
                                        th:value="${prioridad}"
                                        th:text="${prioridad}"></option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Estado Actual</label>
                            <select class="form-select" th:field="*{estado}">
                                <option th:each="estado : ${estados}"
                                        th:value="${estado}"
                                        th:text="${estado}"></option>
                            </select>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label fw-bold">Responsable Técnico / Proveedor asignado</label>
                            <input type="text" class="form-control" th:field="*{responsableTecnico}" placeholder="Ej: Juan Pérez (Plomero)">
                        </div>

                        <div class="col-12 mb-4">
                            <label class="form-label fw-bold">Descripción detallada del problema</label>
                            <textarea class="form-control" rows="4" th:field="*{descripcion}" required placeholder="Detalle el estado del incidente..."></textarea>
                        </div>

                    </div>

                    <div class="text-center border-top pt-3">
                        <button type="submit" class="btn btn-success me-2">
                            <i class="bi bi-check-circle me-1"></i> Guardar Incidente
                        </button>
                        <a th:href="@{/incidentes}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left-short"></i> Volver al listado
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
