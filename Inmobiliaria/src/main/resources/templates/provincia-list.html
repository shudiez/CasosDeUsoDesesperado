<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Provincias</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-building-gear me-2"></i>
                Casos de uso desesperado
            </a>
            <span class="navbar-text text-white-50">
                Gestión de Ubicaciones
            </span>
        </div>
    </nav>

    <div class="container my-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark mb-0">
                <i class="bi bi-map-fill text-secondary me-2"></i>
                Lista de Provincias
            </h2>

            <div>
                <a th:href="@{/}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-left-short"></i> Volver al Inicio
                </a>
                <a th:href="@{/provincia/nueva}" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i> Nueva Provincia
                </a>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

        <div class="card shadow" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0 fs-6">
                    <i class="bi bi-table me-2"></i>Provincias Registradas
                </h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width: 20%">ID</th>
                                <th style="width: 55%">Nombre</th>
                                <th style="width: 25%" class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="provincia : ${provincias}">
                                <td class="fw-bold" th:text="${provincia.id}"></td>
                                <td th:text="${provincia.nombre}"></td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/provincia/editar/{id}(id=${provincia.id})}" class="btn btn-outline-primary" title="Editar">
                                            <i class="bi bi-pencil-square"></i> Editar
                                        </a>
                                        <a th:href="@{/provincia/eliminar/{id}(id=${provincia.id})}" 
                                           onclick="return confirm('¿Está seguro de eliminar la provincia?')" 
                                           class="btn btn-outline-danger" title="Eliminar">
                                            <i class="bi bi-trash"></i> Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(provincias)}">
                                <td colspan="3" class="text-center text-muted py-4">
                                    <i class="bi bi-info-circle me-2"></i>No se encontraron provincias cargadas en el sistema.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
