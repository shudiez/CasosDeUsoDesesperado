<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Factura</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-receipt me-2"></i>
                Casos de uso desesperado
            </a>
            <span class="navbar-text text-white-50">
                Gestión de Facturas
            </span>
        </div>
    </nav>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">
                    <i class="bi bi-file-earmark-plus-fill"></i>
                    <span th:text="${facturaForm.id == null} ? 'Nueva Factura' : 'Editar Factura'"></span>
                </h3>
            </div>

            <div class="card-body">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                </div>

                <p class="text-muted small">Los campos marcados con <span class="text-danger">*</span> son obligatorios.</p>

                <form th:action="@{/facturas/guardar}" th:object="${facturaForm}" method="post">

                    <input type="hidden" th:field="*{id}" />

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Concepto Facturado <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{conceptoFacturado}" />
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('conceptoFacturado')}" 
                                 th:errors="*{conceptoFacturado}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contrato <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{contratoId}">
                                <option value="">-- Seleccionar contrato --</option>
                                <option th:each="c : ${contratos}" th:value="${c.id}" th:text="'Contrato N° ' + ${c.id}"></option>
                            </select>
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('contratoId')}" 
                                 th:errors="*{contratoId}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Emisión <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaEmision}" />
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('fechaEmision')}" 
                                 th:errors="*{fechaEmision}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Vencimiento <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaVencimiento}" />
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('fechaVencimiento')}" 
                                 th:errors="*{fechaVencimiento}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Importe Base <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{importe}" />
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('importe')}" 
                                 th:errors="*{importe}">
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estado Inicial <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{estado}">
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                            </select>
                            <div class="text-danger small fw-bold mt-1" 
                                 th:if="${#fields.hasErrors('estado')}" 
                                 th:errors="*{estado}">
                            </div>
                        </div>

                        <div class="col-12 my-4">
                            <hr />
                            <h4 class="text-secondary"><i class="bi bi-credit-card me-2"></i>Datos de Pago (Opcionales)</h4>
                            <p class="text-success small mb-0">Estos campos pueden quedar vacíos si la factura aún no fue cobrada.</p>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Pago</label>
                            <input type="date" class="form-control" th:field="*{fechaPago}" />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Medio de Pago</label>
                            <select class="form-select" th:field="*{medio}">
                                <option value="">-- Seleccionar medio --</option>
                                <option th:each="m : ${mediosPago}" th:value="${m}" th:text="${m}"></option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Importe Pagado</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{importePagado}" />
                        </div>

                        <div class="col-md-6 mb-4">
                            <label class="form-label">Interés Recargo</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{interes}" />
                        </div>

                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary me-2">
                            <i class="bi bi-check-circle"></i> Guardar Factura
                        </button>
                        <a th:href="@{/facturas}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
