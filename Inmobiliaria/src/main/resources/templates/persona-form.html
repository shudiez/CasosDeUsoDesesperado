<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <!-- Título de la pestaña -->
    <title>Persona</title>

    <!-- Bootstrap para los estilos -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- Barra superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">

            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="bi bi-building-gear me-2"></i>
                Casos de uso desesperado
            </a>

            <span class="navbar-text text-white-50">
                Gestión de Usuarios
            </span>

        </div>
    </nav>

    <div class="container mt-5">

        <!-- Tarjeta que contiene el formulario -->
        <div class="card shadow" style="max-width: 800px; margin: 0 auto;">

            <!-- Título del formulario -->
            <div class="card-header bg-dark text-white">
                <h3 class="mb-0 fs-5">
                    <i class="bi bi-person-fill-add me-2"></i>
                    Alta de Persona
                </h3>
            </div>

            <div class="card-body p-4">

                <!-- Muestra un mensaje si ocurre un error -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                </div>

                <!-- Formulario para guardar una persona -->
                <form th:action="@{/personas}"
                      th:object="${personaForm}"
                      method="post">

                    <!-- Guarda el id cuando se está editando -->
                    <input type="hidden" th:field="*{id}">

                    <div class="row">

                        <!-- Nombre -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">
                                Nombre
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{nombre}">

                            <!-- Muestra el error de validación -->
                            <div class="text-danger small fw-bold mt-1"
                                 th:if="${#fields.hasErrors('nombre')}"
                                 th:errors="*{nombre}">
                            </div>

                        </div>

                        <!-- Apellido -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">
                                Apellido
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{apellido}">

                            <!-- Muestra el error de validación -->
                            <div class="text-danger small fw-bold mt-1"
                                 th:if="${#fields.hasErrors('apellido')}"
                                 th:errors="*{apellido}">
                            </div>

                        </div>

                        <!-- DNI o CUIT -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">
                                DNI / CUIT
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{dniCuit}">

                        </div>

                        <!-- Teléfono -->
                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">
                                Teléfono
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{telefono}">

                        </div>

                        <!-- Correo electrónico -->
                        <div class="col-12 mb-3">

                            <label class="form-label fw-bold">
                                Correo Electrónico
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="ejemplo@correo.com">

                        </div>

                        <!-- Domicilio -->
                        <div class="col-12 mb-4">

                            <label class="form-label fw-bold">
                                Domicilio
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{domicilio}">

                        </div>

                    </div>

                    <!-- Botones -->
                    <div class="text-center border-top pt-3">

                        <!-- Guarda la persona -->
                        <button type="submit"
                                class="btn btn-success me-2">

                            <i class="bi bi-check-circle me-1"></i>
                            Guardar Persona

                        </button>

                        <!-- Vuelve al listado -->
                        <a th:href="@{/personas}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left-short"></i>
                            Volver al listado

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- Pie de página -->
    <footer class="mt-5 py-3 bg-white border-top text-center text-muted">
        © 2026 Casos de uso desesperado - Desarrollo de Software
    </footer>

</body>

</html>
