<!DOCTYPE html>
<html xmlns:th="http://wwww.thymeleaf.com">
	
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2 class="mb-4" th:text="${contrato.id == null} ? 'Nuevo Contrato' : 'Editar Contrato'">Formulario</h2>

	<form th:action="@{/contratos}" th:object="${contrato}" method="post" class="card p-4 shadow-sm">
	    <input type="hidden" th:field="*{id}" />

				<!-- -->
		<div class="row mb-3">
		        <div class="col-12" th:if="${contrato.id != null}">
		            <label class="form-label fw-bold text-muted">Identificador del Contrato:</label>
		            
		            <input th:if="${contrato.id != null}" 
		                   type="text" 
		                   class="form-control bg-light fw-bold text-secondary" 
		                   th:value="'CONTRATO Nº ' + ${contrato.id}" 
		                   disabled />
		                   
		            
	 				<hr class="mb-4 text-muted"> 		    
		        </div>
		    </div>
		    
		
	    <div class="row">
	        <div class="col-md-6 mb-3">
	            <label class="form-label">Propiedad:</label>
	            <select th:field="*{propiedad}" class="form-select" required>
	                <option value="">-- Seleccione Propiedad --</option>
	                <option th:each="p : ${propiedades}" th:value="${p.id}" th:text="${p.direccion}"></option>
	            </select>
	            <div class="text-danger" th:if="${#fields.hasErrors('propiedad')}" th:errors="*{propiedad}"></div>
	        </div>

	        <div class="col-md-6 mb-3">
	            <label class="form-label">Inquilino:</label>
	            <select th:field="*{inquilino}" class="form-select" required>
	                <option value="">-- Seleccione Inquilino --</option>
	                <option th:each="i : ${inquilinos}" th:value="${i.id}" th:text="${i.apellido + ', ' + i.nombre}"></option>
	            </select>
	            <div class="text-danger" th:if="${#fields.hasErrors('inquilino')}" th:errors="*{inquilino}"></div>
	        </div>
	    </div>

	    <div class="row">
	        <div class="col-md-4 mb-3">
	            <label class="form-label">Fecha de Inicio:</label>
	            <input type="date" th:field="*{fechaInicio}" class="form-control" required/>
	            <div class="text-danger" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
	        </div>

	        <div class="col-md-4 mb-3">
	            <label class="form-label">Duración (Meses):</label>
	            <input type="number" min="1" th:field="*{duracionMeses}" class="form-control" required/>
	            <div class="text-danger" th:if="${#fields.hasErrors('duracionMeses')}" th:errors="*{duracionMeses}"></div>
	        </div>

	        <div class="col-md-4 mb-3">
	            <label class="form-label">Día Vencimiento Mensual:</label>
	            <input type="number" min="1" max="31" th:field="*{diaVencimientoMensual}" class="form-control" required/>
	            <div class="text-danger" th:if="${#fields.hasErrors('diaVencimientoMensual')}" th:errors="*{diaVencimientoMensual}"></div>
	        </div>
	    </div>

	    <div class="row">
	        <div class="col-md-6 mb-3">
	            <label class="form-label">Importe Mensual ($):</label>
	            <input type="number" step="0.01" min="0.01" th:field="*{importeMensual}" class="form-control" required/>
	            <div class="text-danger" th:if="${#fields.hasErrors('importeMensual')}" th:errors="*{importeMensual}"></div>
	        </div>

			<div class="col-md-6 mb-3">
			        <label class="form-label">Estado Contrato:</label>
			        
			        <div th:if="${contrato.id == null}">
			            <select th:field="*{estado}" class="form-select" required>
			                <option th:each="est : ${estados}" 
			                        th:if="${est.name() == 'BORRADOR' }" 
			                        th:value="${est}" 
			                        th:text="${est}">
			                </option>
			            </select>
			            <small class="form-text text-muted">Los contratos nuevos solo pueden iniciar en Borrador o Activo.</small>
			        </div>

			        <div th:unless="${contrato.id == null}">
			            <select th:field="*{estado}" class="form-select" required>
			                <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
			            </select>
			            <div class="text-danger" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
			        </div>
			    </div>
	    
			</div>

	    <div class="mb-3">
	        <label class="form-label">Descripción / Términos del Contrato:</label>
	        <textarea th:field="*{descripcion}" class="form-control" rows="4" placeholder="Escriba los detalles aquí..."></textarea>
	        <div class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
	    </div>

	    <div class="mt-4">
	        <button type="submit" class="btn btn-success">Guardar Contrato</button>
	        <a th:href="@{/contratos}" class="btn btn-secondary">Cancelar</a>
	    </div>
	</form>

</body>

</html>
