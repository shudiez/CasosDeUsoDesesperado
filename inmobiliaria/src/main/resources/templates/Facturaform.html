<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Factura</title>
</head>

<body>

	<h1 th:text="${facturaForm.id == null} ? 'Nueva Factura' : 'Editar Factura'"></h1>

	<div th:if="${error}" th:text="${error}" style="color:red; font-weight:bold; margin-bottom: 10px;"></div>

	<p style="color: gray; font-size: 0.9em;">Los campos marcados con <span style="color:red">*</span> son obligatorios.
	</p>

	<form th:action="@{/facturas/guardar}" method="post" th:object="${facturaForm}">

		<input type="hidden" th:field="*{id}" />

		<label>Concepto Facturado: <span style="color:red">*</span></label>
		<input type="text" th:field="*{conceptoFacturado}" />
		<span th:if="${#fields.hasErrors('conceptoFacturado')}" th:errors="*{conceptoFacturado}"
			style="color:red; font-weight:bold;"></span>
		<br /><br />

		<label>Contrato: <span style="color:red">*</span></label>
		<select th:field="*{contratoId}">
			<option value="">-- Seleccionar contrato --</option>
			<option th:each="c : ${contratos}" th:value="${c.id}" th:text="'Contrato N° ' + ${c.id}"></option>
		</select>
		<span th:if="${#fields.hasErrors('contratoId')}" th:errors="*{contratoId}"
			style="color:red; font-weight:bold;"></span>
		<br /><br />

		<label>Fecha Emisión: <span style="color:red">*</span></label>
		<input type="date" th:field="*{fechaEmision}" />
		<span th:if="${#fields.hasErrors('fechaEmision')}" th:errors="*{fechaEmision}"
			style="color:red; font-weight:bold;"></span>
		<br /><br />

		<label>Fecha Vencimiento: <span style="color:red">*</span></label>
		<input type="date" th:field="*{fechaVencimiento}" />
		<span th:if="${#fields.hasErrors('fechaVencimiento')}" th:errors="*{fechaVencimiento}"
			style="color:red; font-weight:bold;"></span>
		<br /><br />

		<label>Importe Base: <span style="color:red">*</span></label>
		<input type="number" step="0.01" th:field="*{importe}" />
		<span th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"
			style="color:red; font-weight:bold;"></span>
		<br /><br />

		<label>Estado Inicial: <span style="color:red">*</span></label>
		<select th:field="*{estado}">
			<option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
		</select>
		<span th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}" style="color:red; font-weight:bold;"></span>
		<br /><br />

		<hr />
		<h3 style="color: #2c3e50;">Datos de Pago (Opcionales)</h3>
		<p style="color: green; font-size: 0.85em;">Estos campos pueden quedar vacíos si la factura aún no fue cobrada.
		</p>

		<label>Fecha Pago:</label>
		<input type="date" th:field="*{fechaPago}" /><br /><br />

		<label>Medio de Pago:</label>
		<select th:field="*{medio}">
			<option value="">-- Seleccionar medio --</option>
			<option th:each="m : ${mediosPago}" th:value="${m}" th:text="${m}"></option>
		</select><br /><br />

		<label>Importe Pagado:</label>
		<input type="number" step="0.01" min="0" th:field="*{importePagado}" /><br /><br />

		<label>Interés Recargo:</label>
		<input type="number" step="0.01" min="0" th:field="*{interes}" /><br /><br />

		<button type="submit" style="padding: 5px 15px; font-weight:bold;">Guardar Factura</button>
		<a th:href="@{/facturas}" style="margin-left: 10px; color: gray;">Cancelar</a>

	</form>

</body>

</html>
