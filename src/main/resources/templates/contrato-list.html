<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Contratos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Contratos</h2>
        <a th:href="@{/contrato/nuevo}" class="btn btn-primary">Nuevo Contrato</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Propiedad (ID)</th>
                <th>Monto ($)</th>
                <th>Fecha Inicio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${contratos}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.propiedad != null ? c.propiedad.id : 'No asignada'}"></td>
                <td th:text="${c.monto}"></td>
                <td th:text="${c.fechaInicio}"></td>
                <td>
                    <a th:href="@{/contrato/editar/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/contrato/eliminar/{id}(id=${c.id})}" class="btn btn-danger btn-sm" 
                       onclick="return confirm('¿Seguro que deseas eliminar este contrato?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/propiedades}" class="btn btn-secondary mt-3">Ir a Propiedades</a>
</body>

</html>
