<!DOCTYPE html>
<html xmlns:th="http://wwww.thymelead.com">
	
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2 class="mb-4" th:text="${contrato.id == null} ? 'Nuevo Contrato' : 'Editar Contrato'">Formulario</h2>

    <form th:action="@{/contratos}" th:object="${contrato}" method="post" class="card p-4 shadow-sm">
        
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Propiedad:</label>
            <select th:field="*{propiedad}" class="form-select" required>
                <option value="">-- Seleccione una Propiedad --</option>
                <option th:each="p : ${propiedades}" 
                        th:value="${p.id}" 
                        th:text="'ID: ' + ${p.id} + ' - ' + ${p.direccion}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Monto Mensual:</label>
            <input type="number" step="0.01" th:field="*{importeMensual}" class="form-control" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de Inicio:</label>
            <input type="date" th:field="*{fechaInicio}" class="form-control" required/>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Guardar Contrato</button>
            <a th:href="@{/contratos}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

</body>

</html>
