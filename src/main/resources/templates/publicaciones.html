<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Publicaciones</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 0 20px; color: #333; }
        .form-section, .list-section { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 4px; }
        h1, h2, h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        button, a { padding: 8px 15px; cursor: pointer; text-decoration: none; border: 1px solid #333; background: #fff; color: #333; }
        button:hover, a:hover { background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f9f9f9; }
        .alert { padding: 10px; margin-bottom: 15px; border: 1px solid #999; }
    </style>
</head>
<body>

    <div th:if="${mensajeExito}" class="alert" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert" th:text="${mensajeError}"></div>

    <h1>Gestión de Publicaciones</h1>

    <div class="form-section">
        <h2 th:text="${publicacion.id == null ? 'Nueva Publicación' : 'Modificar Publicación (ID: ' + publicacion.id + ')'}"></h2>

        <form th:action="@{${publicacion.id == null ? '/publicaciones/alta' : '/publicaciones/editar/' + publicacion.id}}" th:object="${publicacion}" method="post">
            
            <div class="form-group">
                <label>Propiedad:</label>
                <select th:if="${publicacion.id == null}" name="propiedad.id" required>
                    <option value="">-- Seleccione una propiedad --</option>
                    <option th:each="prop : ${propiedadesDisponibles}" th:value="${prop.id}" th:text="${prop.direccion + ' (' + prop.tipo + ')'}"></option>
                </select>

                <div th:if="${publicacion.id != null}">
                    <input type="text" th:value="${publicacion.propiedad.direccion + ' (' + publicacion.propiedad.tipo + ')'}" disabled>
                    <input type="hidden" name="propiedad.id" th:value="${publicacion.propiedad.id}">
                </div>
            </div>
            
            <div class="form-group">
                <label>Precio:</label>
                <input type="number" step="0.01" th:field="*{precioMensual}" required>
            </div>

            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" th:field="*{fechaPublicacion}" required>
            </div>

            <div class="form-group" th:if="${publicacion.id != null}">
                <label>Estado:</label>
                <select th:field="*{estado}" required>
                    <option value="ACTIVA">Activa</option>
                    <option value="PAUSADA">Pausada</option>
                    <option value="FINALIZADA">Finalizada</option>
                </select>
            </div>

            <div class="form-group">
                <label>Condiciones:</label>
                <textarea th:field="*{condiciones}" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>Descripción:</label>
                <textarea th:field="*{descripcion}" rows="2" required></textarea>
            </div>

            <div class="actions">
                <a th:if="${publicacion.id != null}" th:href="@{/publicaciones/alta}">Cancelar</a>
                <button th:if="${publicacion.id == null}" type="reset">Limpiar</button>
                <button type="submit" th:text="${publicacion.id == null ? 'Publicar' : 'Guardar Cambios'}"></button>
            </div>
        </form>
    </div>

    <div class="list-section">
        <h3>Catálogo de Publicaciones</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Propiedad</th>
                    <th>Precio</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
					
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(listaPublicaciones)}">
                    <td colspan="6">No hay publicaciones registradas.</td>
                </tr>
                <tr th:each="pub : ${listaPublicaciones}">
                    <td th:text="${pub.id}"></td>
                    <td th:text="${pub.propiedad.direccion + ' (' + pub.propiedad.tipo + ')'}"></td>
                    <td th:text="${pub.precioMensual}"></td>
                    <td th:text="${pub.fechaPublicacion}"></td>
                    <td th:text="${pub.estado}"></td>
                    <td>
                        <a th:href="@{/publicaciones/editar/{id}(id=${pub.id})}">Editar</a>
                        <form th:action="@{/publicaciones/eliminar/{id}(id=${pub.id})}" method="post" style="display:inline;">
                            <button type="submit" onclick="return confirm('¿Confirmar baja?');">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
