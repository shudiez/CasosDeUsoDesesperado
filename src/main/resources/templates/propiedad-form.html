<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Nueva Propiedad</title>
</head>

<body>

	<h1>Nueva Propiedad</h1>

	<form th:action="@{/propiedades}" th:object="${propiedad}" method="post">
		<input type="hidden" th:field="*{id}">

		<label>Dirección:</label>
		<input type="text" th:field="*{direccion}" required>
		<br><br>

		<label>Descripción:</label>
		<input type="text" th:field="*{descripcion}" required>
		<br><br>

		<label>Cantidad de Ambientes:</label>
		<input type="number" th:field="*{cantidadAmbientes}" min="1" required>
		<br><br>

		<label>Metros Cuadrados:</label>
		<input type="number" step="0.01" th:field="*{metrosCuadrados}" min="1" required>
		<br><br>

		<button type="submit">Guardar</button>

	</form>

	<br>

	<a href="/propiedades">Volver al listado</a>

</body>

</html>
